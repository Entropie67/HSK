<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mémoriser 316 mots — HSK 5 fréquence</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&family=Noto+Serif+SC:wght@400;700&family=Inter:wght@300;400;500;600;700&display=swap');

        :root {
            --primary: #5b21b6;
            --primary-light: #7c3aed;
            --primary-dark: #3b0764;
            --accent: #c0392b;
            --gold: #f39c12;
            --gold-light: #fef5e7;
            --bg: #f5f7fa;
            --card: #ffffff;
            --text: #2c3e50;
            --text-light: #7f8c8d;
            --border: #e8ecf1;
            --success: #27ae60;
            --danger: #e74c3c;
            --gradient-hero: linear-gradient(135deg, #0f0520 0%, #1e0a3c 30%, #5b21b6 70%, #7c3aed 100%);
            --shadow-sm: 0 2px 8px rgba(0,0,0,0.04);
            --shadow-md: 0 4px 20px rgba(0,0,0,0.06);
            --shadow-lg: 0 10px 40px rgba(0,0,0,0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', 'Noto Sans SC', sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            min-height: 100vh;
        }

        /* HERO */
        .hero {
            background: var(--gradient-hero);
            color: white;
            padding: 36px 20px 60px;
            position: relative;
            overflow: hidden;
        }
        .hero::after {
            content: '';
            position: absolute;
            bottom: 0; left: 0; right: 0;
            height: 40px;
            background: var(--bg);
            clip-path: ellipse(55% 100% at 50% 100%);
        }
        .hero-inner {
            max-width: 920px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: rgba(255,255,255,0.7);
            text-decoration: none;
            font-size: 0.88rem;
            margin-bottom: 16px;
        }
        .back-link:hover { color: white; }
        .hero h1 {
            font-family: 'Noto Serif SC', serif;
            font-size: 2.2rem;
            font-weight: 800;
            margin-bottom: 4px;
        }
        .hero p {
            opacity: 0.8;
            font-size: 0.98rem;
            font-weight: 300;
        }

        /* TOOLBAR */
        .toolbar {
            max-width: 920px;
            margin: -25px auto 24px;
            padding: 0 20px;
            position: relative;
            z-index: 2;
        }
        .toolbar-inner {
            background: var(--card);
            border-radius: 14px;
            box-shadow: var(--shadow-lg);
            padding: 16px 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 14px;
            align-items: center;
            justify-content: space-between;
        }
        .progress-info {
            display: flex;
            gap: 16px;
            align-items: center;
        }
        .progress-num {
            font-size: 1.4rem;
            font-weight: 800;
            color: var(--primary);
            line-height: 1;
        }
        .progress-bar {
            width: 160px;
            height: 8px;
            background: var(--border);
            border-radius: 4px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--primary-light));
            transition: width 0.3s;
        }

        .mode-tabs {
            display: flex;
            gap: 4px;
            background: var(--bg);
            border-radius: 10px;
            padding: 4px;
        }
        .mode-tab {
            padding: 7px 16px;
            border-radius: 8px;
            border: none;
            background: transparent;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            color: var(--text-light);
            transition: all 0.2s;
            font-family: inherit;
        }
        .mode-tab.active {
            background: var(--primary);
            color: white;
        }

        /* CONTENT */
        .content {
            max-width: 920px;
            margin: 0 auto;
            padding: 0 20px 60px;
        }

        /* RANGE SELECTOR */
        .range-selector {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 22px;
            justify-content: center;
        }
        .range-chip {
            padding: 8px 14px;
            border-radius: 20px;
            border: 1px solid var(--border);
            background: var(--card);
            color: var(--text-light);
            font-size: 0.82rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }
        .range-chip:hover {
            border-color: var(--primary-light);
            color: var(--primary);
        }
        .range-chip.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        /* FILTER BUTTONS */
        .filter-bar {
            display: flex;
            gap: 8px;
            margin-bottom: 18px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .filter-btn {
            padding: 6px 12px;
            border-radius: 16px;
            border: 1px solid var(--border);
            background: var(--card);
            font-size: 0.78rem;
            cursor: pointer;
            color: var(--text-light);
            font-family: inherit;
        }
        .filter-btn.active {
            background: var(--gold-light);
            color: var(--gold);
            border-color: var(--gold);
        }

        /* FLASHCARD */
        .flashcard {
            background: var(--card);
            border-radius: 18px;
            padding: 40px 32px;
            box-shadow: var(--shadow-md);
            margin-bottom: 16px;
            min-height: 340px;
            display: flex;
            flex-direction: column;
            text-align: center;
        }
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            font-size: 0.78rem;
            color: var(--text-light);
            letter-spacing: 1px;
        }
        .card-rank {
            font-weight: 700;
            color: var(--primary);
        }
        .status-badge {
            font-size: 0.7rem;
            padding: 3px 10px;
            border-radius: 10px;
            font-weight: 700;
            letter-spacing: 0.5px;
        }
        .status-badge.known {
            background: #dcfce7;
            color: var(--success);
        }
        .status-badge.review {
            background: #fef3c7;
            color: #b45309;
        }
        .status-badge.new {
            background: #f3f4f6;
            color: var(--text-light);
        }

        .hanzi {
            font-family: 'Noto Serif SC', serif;
            font-size: 5rem;
            font-weight: 700;
            color: var(--primary-dark);
            line-height: 1.1;
            margin-bottom: 12px;
        }
        .pinyin {
            font-size: 1.4rem;
            color: var(--primary-light);
            margin-bottom: 8px;
            font-weight: 500;
            letter-spacing: 1px;
        }
        .translation {
            font-size: 1.15rem;
            color: var(--text);
            margin-bottom: 20px;
        }
        .example-block {
            background: var(--gold-light);
            border-left: 4px solid var(--gold);
            padding: 16px 18px;
            border-radius: 10px;
            text-align: left;
            margin-top: auto;
        }
        .example-cn {
            font-size: 1.15rem;
            color: var(--text);
            font-family: 'Noto Serif SC', serif;
            margin-bottom: 6px;
        }
        .example-cn .highlight {
            color: var(--accent);
            font-weight: 700;
        }
        .example-tr {
            font-size: 0.92rem;
            color: var(--text-light);
            font-style: italic;
        }
        .reveal-btn {
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            color: white;
            border: none;
            padding: 14px 32px;
            border-radius: 10px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            margin: auto;
            font-family: inherit;
            transition: transform 0.2s;
        }
        .reveal-btn:hover {
            transform: translateY(-2px);
        }
        .hidden { display: none !important; }

        /* QCM */
        .quiz-block {
            background: var(--card);
            border-radius: 14px;
            padding: 24px;
            box-shadow: var(--shadow-sm);
            margin-bottom: 16px;
            border: 1px solid var(--border);
        }
        .quiz-question {
            font-size: 0.92rem;
            color: var(--text-light);
            margin-bottom: 12px;
        }
        .quiz-sentence {
            font-family: 'Noto Serif SC', serif;
            font-size: 1.2rem;
            color: var(--text);
            margin-bottom: 6px;
        }
        .quiz-blank {
            display: inline-block;
            min-width: 60px;
            border-bottom: 2px solid var(--accent);
            color: var(--accent);
            font-weight: 700;
            text-align: center;
            margin: 0 4px;
        }
        .quiz-translation {
            font-size: 0.85rem;
            color: var(--text-light);
            font-style: italic;
            margin-bottom: 16px;
        }
        .quiz-options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        .quiz-option {
            padding: 12px 16px;
            border: 2px solid var(--border);
            border-radius: 10px;
            background: var(--card);
            cursor: pointer;
            font-size: 1.05rem;
            font-family: 'Noto Serif SC', serif;
            transition: all 0.2s;
            text-align: center;
        }
        .quiz-option:hover {
            border-color: var(--primary-light);
        }
        .quiz-option.correct {
            background: #dcfce7;
            border-color: var(--success);
            color: var(--success);
        }
        .quiz-option.wrong {
            background: #fee2e2;
            border-color: var(--danger);
            color: var(--danger);
        }
        .quiz-option:disabled { cursor: not-allowed; }

        /* CONTROLS */
        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
            margin-bottom: 12px;
        }
        .ctrl-btn {
            padding: 14px;
            border-radius: 12px;
            border: 2px solid;
            background: var(--card);
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 600;
            transition: all 0.2s;
            font-family: inherit;
        }
        .ctrl-btn.review {
            border-color: #fbbf24;
            color: #b45309;
        }
        .ctrl-btn.review:hover {
            background: #fef3c7;
        }
        .ctrl-btn.skip {
            border-color: var(--border);
            color: var(--text-light);
        }
        .ctrl-btn.skip:hover {
            background: var(--bg);
        }
        .ctrl-btn.known {
            border-color: var(--success);
            color: var(--success);
        }
        .ctrl-btn.known:hover {
            background: #dcfce7;
        }

        .nav-row {
            display: flex;
            gap: 10px;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        .nav-btn {
            padding: 10px 18px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: var(--card);
            cursor: pointer;
            font-size: 0.85rem;
            font-family: inherit;
            color: var(--text);
        }
        .nav-btn:hover { border-color: var(--primary-light); color: var(--primary); }
        .nav-btn:disabled { opacity: 0.4; cursor: not-allowed; }
        .pos-info {
            font-size: 0.85rem;
            color: var(--text-light);
        }

        /* LIST VIEW */
        .list-search {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 10px 14px;
            width: 100%;
            font-size: 0.95rem;
            font-family: inherit;
            margin-bottom: 16px;
        }
        .list-search:focus {
            outline: none;
            border-color: var(--primary-light);
        }
        .word-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 12px;
        }
        .word-item {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px 18px;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
        }
        .word-item:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
            border-color: var(--primary-light);
        }
        .word-item.known {
            border-left: 4px solid var(--success);
        }
        .word-item.review {
            border-left: 4px solid #fbbf24;
        }
        .word-rank {
            position: absolute;
            top: 12px;
            right: 14px;
            font-size: 0.72rem;
            color: var(--text-light);
            font-weight: 700;
        }
        .word-hz {
            font-family: 'Noto Serif SC', serif;
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary-dark);
            margin-bottom: 2px;
        }
        .word-py {
            font-size: 0.88rem;
            color: var(--primary-light);
            margin-bottom: 4px;
        }
        .word-fr {
            font-size: 0.88rem;
            color: var(--text);
            line-height: 1.4;
        }
        .word-ex {
            margin-top: 8px;
            font-size: 0.82rem;
            color: var(--text-light);
            font-family: 'Noto Serif SC', serif;
            line-height: 1.5;
        }

        footer {
            text-align: center;
            padding: 30px 20px;
            color: var(--text-light);
            font-size: 0.8rem;
            border-top: 1px solid var(--border);
        }

        @media (max-width: 720px) {
            .hero h1 { font-size: 1.7rem; }
            .toolbar-inner { flex-direction: column; align-items: stretch; }
            .progress-info { justify-content: space-between; }
            .progress-bar { flex: 1; }
            .hanzi { font-size: 3.6rem; }
            .quiz-options { grid-template-columns: 1fr; }
            .controls { grid-template-columns: 1fr; }
            .word-list { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<header class="hero">
    <div class="hero-inner">
        <a href="index.html" class="back-link">← Retour</a>
        <h1>Mémoriser les 316 mots</h1>
        <p>Flashcards · Exemples chinois → français · QCM · Progression sauvegardée</p>
    </div>
</header>

<div class="toolbar">
    <div class="toolbar-inner">
        <div class="progress-info">
            <div>
                <div class="progress-num"><span id="knownCount">0</span><span style="font-size:0.9rem; color:var(--text-light); font-weight:500;"> / <span id="totalCount">316</span></span></div>
                <div style="font-size:0.72rem; color:var(--text-light); letter-spacing:1px;">MOTS SUS</div>
            </div>
            <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
        </div>
        <div class="mode-tabs">
            <button class="mode-tab active" data-mode="card" onclick="setMode('card')">🃏 Cartes</button>
            <button class="mode-tab" data-mode="list" onclick="setMode('list')">📋 Liste</button>
        </div>
    </div>
</div>

<div class="content">

    <!-- Range selector -->
    <div class="range-selector" id="rangeSelector"></div>

    <!-- Filter (only for list view) -->
    <div class="filter-bar hidden" id="filterBar">
        <button class="filter-btn active" data-filter="all" onclick="setFilter('all')">Tous</button>
        <button class="filter-btn" data-filter="known" onclick="setFilter('known')">✅ Sus</button>
        <button class="filter-btn" data-filter="review" onclick="setFilter('review')">🔁 À revoir</button>
        <button class="filter-btn" data-filter="new" onclick="setFilter('new')">🆕 Nouveaux</button>
    </div>

    <!-- CARD MODE -->
    <div id="cardMode">
        <!-- Card -->
        <div class="flashcard" id="flashcard">
            <div class="card-header">
                <span class="card-rank" id="cardRank">#1</span>
                <span class="status-badge new" id="cardStatus">NOUVEAU</span>
            </div>

            <div class="hanzi" id="cardHanzi">—</div>

            <button class="reveal-btn" id="revealBtn" onclick="revealCard()">Révéler le sens</button>

            <div class="hidden" id="cardReveal">
                <div class="pinyin" id="cardPinyin"></div>
                <div class="translation" id="cardTranslation"></div>

                <div class="example-block">
                    <div class="example-cn" id="cardExample"></div>
                    <div class="example-tr" id="cardExampleTr"></div>
                </div>
            </div>
        </div>

        <!-- QCM (shows after reveal) -->
        <div class="quiz-block hidden" id="quizBlock">
            <div class="quiz-question">📝 Petit exercice — choisissez le bon mot</div>
            <div class="quiz-sentence" id="quizSentence"></div>
            <div class="quiz-translation" id="quizTranslation"></div>
            <div class="quiz-options" id="quizOptions"></div>
        </div>

        <!-- Controls -->
        <div class="controls hidden" id="controls">
            <button class="ctrl-btn review" onclick="markCard('review')">🔁 À revoir</button>
            <button class="ctrl-btn skip" onclick="markCard('skip')">⏭ Passer</button>
            <button class="ctrl-btn known" onclick="markCard('known')">✅ Su</button>
        </div>

        <!-- Nav -->
        <div class="nav-row">
            <button class="nav-btn" id="prevBtn" onclick="prevCard()">← Précédent</button>
            <span class="pos-info"><span id="cardPos">1</span> / <span id="rangeTotal">50</span></span>
            <button class="nav-btn" id="nextBtn" onclick="nextCard()">Suivant →</button>
        </div>
    </div>

    <!-- LIST MODE -->
    <div id="listMode" class="hidden">
        <input type="text" class="list-search" id="searchInput" placeholder="Rechercher (汉字, pinyin, ou français)...">
        <div class="word-list" id="wordList"></div>
    </div>

</div>

<footer>
    HSK 5 — Vocabulaire par fréquence — 刘老师的中文课
</footer>

<script>
// ===== DATA — 316 mots HSK 5 par fréquence =====
const WORDS = [
    {i:1,hz:"包括",py:"bāokuò",fr:"inclure, comprendre",ex:"会议费用包括午餐和饮料。",tr:"Le coût de la réunion inclut le déjeuner et les boissons."},
    {i:2,hz:"表达",py:"biǎodá",fr:"exprimer",ex:"他不太会表达自己的感情。",tr:"Il ne sait pas très bien exprimer ses sentiments."},
    {i:3,hz:"海鲜",py:"hǎixiān",fr:"fruits de mer",ex:"我对海鲜过敏，不能吃。",tr:"Je suis allergique aux fruits de mer, je ne peux pas en manger."},
    {i:4,hz:"结帐",py:"jiézhàng",fr:"régler l'addition",ex:"服务员，请帮我们结帐。",tr:"Serveur, l'addition s'il vous plaît."},
    {i:5,hz:"控制",py:"kòngzhì",fr:"contrôler, maîtriser",ex:"他很难控制自己的脾气。",tr:"Il a du mal à contrôler son caractère."},
    {i:6,hz:"清淡",py:"qīngdàn",fr:"léger (cuisine), peu épicé",ex:"医生说我应该吃得清淡一点。",tr:"Le médecin dit que je devrais manger plus léger."},
    {i:7,hz:"庆祝",py:"qìngzhù",fr:"célébrer, fêter",ex:"我们去餐厅庆祝他的生日。",tr:"Nous allons au restaurant pour fêter son anniversaire."},
    {i:8,hz:"蔬菜",py:"shūcài",fr:"légumes",ex:"多吃新鲜蔬菜对身体好。",tr:"Manger beaucoup de légumes frais est bon pour la santé."},
    {i:9,hz:"胃",py:"wèi",fr:"estomac",ex:"我最近胃不太舒服。",tr:"Mon estomac me dérange ces derniers temps."},
    {i:10,hz:"消化",py:"xiāohuà",fr:"digérer",ex:"晚饭后散步有助于消化。",tr:"Une promenade après le dîner aide à la digestion."},
    {i:11,hz:"占",py:"zhàn",fr:"occuper, représenter (proportion)",ex:"年轻人占公司员工的一半。",tr:"Les jeunes représentent la moitié des employés de l'entreprise."},
    {i:12,hz:"代表",py:"dàibiǎo",fr:"représenter, représentant",ex:"他代表公司参加了会议。",tr:"Il a représenté l'entreprise à la réunion."},

    {i:14,hz:"岸",py:"àn",fr:"rive, berge",ex:"小船慢慢靠近了岸边。",tr:"Le petit bateau s'est lentement approché de la rive."},
    {i:15,hz:"从而",py:"cóng'ér",fr:"ainsi, par conséquent",ex:"他努力学习，从而取得了好成绩。",tr:"Il a étudié dur et a ainsi obtenu de bons résultats."},
    {i:16,hz:"贷款",py:"dàikuǎn",fr:"prêt, emprunter",ex:"他向银行贷款买了房子。",tr:"Il a emprunté à la banque pour acheter une maison."},
    {i:17,hz:"幅",py:"fú",fr:"(spéc. tableaux, tissus)",ex:"墙上挂着一幅中国画。",tr:"Une peinture chinoise est accrochée au mur."},
    {i:18,hz:"颗",py:"kē",fr:"(spéc. pour petits objets ronds)",ex:"天上有几颗星星在闪。",tr:"Quelques étoiles brillent dans le ciel."},
    {i:19,hz:"盆",py:"pén",fr:"bassine, pot (de fleurs)",ex:"妈妈买了一盆花放在阳台上。",tr:"Maman a acheté un pot de fleurs pour le balcon."},
    {i:20,hz:"批",py:"pī",fr:"lot, groupe (spéc.)",ex:"今天来了一批新学生。",tr:"Un nouveau groupe d'étudiants est arrivé aujourd'hui."},
    {i:21,hz:"片",py:"piàn",fr:"tranche, morceau (spéc.)",ex:"请给我一片面包。",tr:"Donnez-moi une tranche de pain s'il vous plaît."},
    {i:22,hz:"套",py:"tào",fr:"ensemble (spéc.)",ex:"他买了一套新家具。",tr:"Il a acheté un ensemble de meubles neufs."},

// ===== STATE =====
const RANGE_SIZE = 50;
const TOTAL = WORDS.length;
const STORAGE_KEY = 'hsk5-freq-progress-v1';

let state = {
    rangeStart: 1,
    rangeEnd: 50,
    currentIdx: 1, // 1-based global index
    mode: 'card',
    filter: 'all',
    progress: {} // {wordIdx: 'known'|'review'}
};

// ===== STORAGE =====
function loadProgress() {
    try {
        const saved = localStorage.getItem(STORAGE_KEY);
        if (saved) state.progress = JSON.parse(saved);
    } catch(e) {}
}
function saveProgress() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state.progress));
}

// ===== INIT RANGE BUTTONS =====
function buildRanges() {
    const ranges = [];
    for (let s = 1; s <= TOTAL; s += RANGE_SIZE) {
        const e = Math.min(s + RANGE_SIZE - 1, TOTAL);
        ranges.push({s, e});
    }
    const sel = document.getElementById('rangeSelector');
    sel.innerHTML = ranges.map(r =>
        `<button class="range-chip${r.s === state.rangeStart ? ' active' : ''}" onclick="setRange(${r.s}, ${r.e})">${r.s}–${r.e}</button>`
    ).join('') + `<button class="range-chip" onclick="setRange(1, ${TOTAL})">Tous</button>`;
}

function setRange(s, e) {
    state.rangeStart = s;
    state.rangeEnd = e;
    state.currentIdx = s;
    document.querySelectorAll('.range-chip').forEach(c => c.classList.remove('active'));
    event.target.classList.add('active');
    if (state.mode === 'card') showCard();
    else renderList();
}

// ===== MODE =====
function setMode(m) {
    state.mode = m;
    document.querySelectorAll('.mode-tab').forEach(t => {
        t.classList.toggle('active', t.dataset.mode === m);
    });
    if (m === 'card') {
        document.getElementById('cardMode').classList.remove('hidden');
        document.getElementById('listMode').classList.add('hidden');
        document.getElementById('filterBar').classList.add('hidden');
        showCard();
    } else {
        document.getElementById('cardMode').classList.add('hidden');
        document.getElementById('listMode').classList.remove('hidden');
        document.getElementById('filterBar').classList.remove('hidden');
        renderList();
    }
}

// ===== FILTER (list mode) =====
function setFilter(f) {
    state.filter = f;
    document.querySelectorAll('.filter-btn').forEach(b => {
        b.classList.toggle('active', b.dataset.filter === f);
    });
    renderList();
}

// ===== CARD =====
function getCurrentWord() {
    return WORDS[state.currentIdx - 1];
}

function showCard() {
    const w = getCurrentWord();
    document.getElementById('cardRank').textContent = `#${w.i}`;
    document.getElementById('cardHanzi').textContent = w.hz;
    document.getElementById('cardPinyin').textContent = w.py;
    document.getElementById('cardTranslation').textContent = w.fr;
    // Highlight target word in example
    const exHtml = w.ex.replace(w.hz, `<span class="highlight">${w.hz}</span>`);
    document.getElementById('cardExample').innerHTML = exHtml;
    document.getElementById('cardExampleTr').textContent = w.tr;

    // Status
    const stat = state.progress[w.i];
    const badge = document.getElementById('cardStatus');
    if (stat === 'known') { badge.textContent = '✅ SU'; badge.className = 'status-badge known'; }
    else if (stat === 'review') { badge.textContent = '🔁 À REVOIR'; badge.className = 'status-badge review'; }
    else { badge.textContent = 'NOUVEAU'; badge.className = 'status-badge new'; }

    // Reset reveal
    document.getElementById('revealBtn').classList.remove('hidden');
    document.getElementById('cardReveal').classList.add('hidden');
    document.getElementById('quizBlock').classList.add('hidden');
    document.getElementById('controls').classList.add('hidden');

    // Position info
    const posInRange = w.i - state.rangeStart + 1;
    const rangeTotal = state.rangeEnd - state.rangeStart + 1;
    document.getElementById('cardPos').textContent = posInRange;
    document.getElementById('rangeTotal').textContent = rangeTotal;
    document.getElementById('prevBtn').disabled = w.i <= state.rangeStart;
    document.getElementById('nextBtn').disabled = w.i >= state.rangeEnd;

    updateProgress();
}

function revealCard() {
    document.getElementById('revealBtn').classList.add('hidden');
    document.getElementById('cardReveal').classList.remove('hidden');
    buildQuiz();
    document.getElementById('quizBlock').classList.remove('hidden');
    document.getElementById('controls').classList.remove('hidden');
}

// ===== QUIZ =====
function buildQuiz() {
    const w = getCurrentWord();
    // Sentence with blank
    const blank = `<span class="quiz-blank">＿＿</span>`;
    const blanked = w.ex.replace(w.hz, blank);
    document.getElementById('quizSentence').innerHTML = blanked;
    document.getElementById('quizTranslation').textContent = w.tr;

    // Build options: correct + 3 distractors from same range (or random if not enough)
    const pool = WORDS.filter(x => x.i !== w.i && x.i >= state.rangeStart && x.i <= state.rangeEnd);
    const distractors = shuffle(pool).slice(0, 3);
    if (distractors.length < 3) {
        // pad with random from full list
        const extras = shuffle(WORDS.filter(x => x.i !== w.i && !distractors.find(d => d.i === x.i)));
        while (distractors.length < 3) distractors.push(extras.shift());
    }
    const options = shuffle([w, ...distractors]);
    const optHtml = options.map(o =>
        `<button class="quiz-option" onclick="answerQuiz(this, ${o.i === w.i})">${o.hz}</button>`
    ).join('');
    document.getElementById('quizOptions').innerHTML = optHtml;
}

function answerQuiz(btn, correct) {
    const all = document.querySelectorAll('.quiz-option');
    all.forEach(b => b.disabled = true);
    if (correct) {
        btn.classList.add('correct');
    } else {
        btn.classList.add('wrong');
        // also highlight correct
        const w = getCurrentWord();
        all.forEach(b => { if (b.textContent === w.hz) b.classList.add('correct'); });
    }
}

function shuffle(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
}

// ===== MARK / NAV =====
function markCard(status) {
    const w = getCurrentWord();
    if (status === 'skip') {
        delete state.progress[w.i];
    } else {
        state.progress[w.i] = status;
    }
    saveProgress();
    nextCard();
}

function nextCard() {
    if (state.currentIdx < state.rangeEnd) {
        state.currentIdx++;
        showCard();
    }
}
function prevCard() {
    if (state.currentIdx > state.rangeStart) {
        state.currentIdx--;
        showCard();
    }
}

// ===== PROGRESS =====
function updateProgress() {
    const known = Object.values(state.progress).filter(v => v === 'known').length;
    document.getElementById('knownCount').textContent = known;
    document.getElementById('totalCount').textContent = TOTAL;
    document.getElementById('progressFill').style.width = `${(known / TOTAL) * 100}%`;
}

// ===== LIST =====
function renderList() {
    const search = (document.getElementById('searchInput')?.value || '').toLowerCase().trim();
    const list = WORDS.filter(w => {
        if (w.i < state.rangeStart || w.i > state.rangeEnd) return false;
        const stat = state.progress[w.i] || 'new';
        if (state.filter === 'known' && stat !== 'known') return false;
        if (state.filter === 'review' && stat !== 'review') return false;
        if (state.filter === 'new' && stat !== 'new') return false;
        if (search) {
            const hay = `${w.hz} ${w.py} ${w.fr}`.toLowerCase();
            if (!hay.includes(search)) return false;
        }
        return true;
    });

    const container = document.getElementById('wordList');
    if (list.length === 0) {
        container.innerHTML = '<div style="grid-column:1/-1; text-align:center; padding:40px; color:var(--text-light);">Aucun résultat</div>';
        return;
    }
    container.innerHTML = list.map(w => {
        const stat = state.progress[w.i];
        const cls = stat === 'known' ? 'known' : stat === 'review' ? 'review' : '';
        return `
            <div class="word-item ${cls}" onclick="jumpToCard(${w.i})">
                <div class="word-rank">#${w.i}</div>
                <div class="word-hz">${w.hz}</div>
                <div class="word-py">${w.py}</div>
                <div class="word-fr">${w.fr}</div>
                <div class="word-ex">${w.ex} <em style="color:var(--text-light); font-style:italic;">— ${w.tr}</em></div>
            </div>
        `;
    }).join('');
    updateProgress();
}

function jumpToCard(i) {
    state.currentIdx = i;
    // Adjust range to include this index
    const rangeIdx = Math.floor((i - 1) / RANGE_SIZE);
    state.rangeStart = rangeIdx * RANGE_SIZE + 1;
    state.rangeEnd = Math.min(state.rangeStart + RANGE_SIZE - 1, TOTAL);
    setMode('card');
    buildRanges();
}

// ===== KEYBOARD =====
document.addEventListener('keydown', (e) => {
    if (state.mode !== 'card') return;
    if (e.target.tagName === 'INPUT') return;
    if (e.key === 'ArrowRight') nextCard();
    else if (e.key === 'ArrowLeft') prevCard();
    else if (e.key === ' ' || e.key === 'Enter') {
        e.preventDefault();
        if (!document.getElementById('revealBtn').classList.contains('hidden')) revealCard();
    } else if (e.key === '1') markCard('review');
    else if (e.key === '2') markCard('skip');
    else if (e.key === '3') markCard('known');
});

// ===== INIT =====
loadProgress();
buildRanges();
showCard();
updateProgress();

document.getElementById('searchInput').addEventListener('input', renderList);
</script>
